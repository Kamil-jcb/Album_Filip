<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kosmiczny Album</title>

<style>

body{
background:radial-gradient(circle,#032003,#000);
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.player{
background:#071707;
padding:25px;
border-radius:15px;
box-shadow:0 0 40px #00ff66;
width:420px;
text-align:center;
}

.cover{
width:100%;
border-radius:12px;
box-shadow:0 0 20px #00ff88;
margin-bottom:15px;
}

ul{
list-style:none;
padding:0;
max-height:240px;
overflow-y:auto;
}

li{
padding:8px;
cursor:pointer;
border-bottom:1px solid #00ff44;
}

li:hover{
background:#00ff2230;
}

button{
background:#00aa44;
border:none;
padding:10px;
margin:5px;
font-size:18px;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#00ff66;
}

.options{
margin-top:10px;
}

</style>
</head>

<body>

<div class="player">

<img src="cover.jpg" class="cover">

<h2>ALIEN BOY</h2>

<ul id="playlist"></ul>

<div>
<button onclick="prevTrack()">⏮</button>
<button onclick="togglePlay()">▶ / ⏸</button>
<button onclick="nextTrack()">⏭</button>
</div>

<div class="options">
<label><input type="checkbox" id="autoplay" checked> Autoplay</label>
<label><input type="checkbox" id="loop"> Loop</label>
<label><input type="checkbox" id="shuffle"> Shuffle</label>
</div>

<audio id="audio"></audio>

</div>

<script>

const songs=[
"AMAZOŃSKA JUNGLA",
"OKULARY",
"KOSMITA",
"GRILL U GAWRONA",
"GA-GA-GAWRON",
"SEX TAPE",
"KICI KICI",
"GEJOWSKI RAJDOWIEC",
"CHAŁUPY WELCOME TO",
"ŁAŁ",
"DISS NA GAWRONA"
];

const audio=document.getElementById("audio");
const playlist=document.getElementById("playlist");

let current=0;

songs.forEach((song,i)=>{
let li=document.createElement("li");
li.textContent=(i+1)+". "+song;
li.onclick=()=>playTrack(i);
playlist.appendChild(li);
});

function playTrack(i){
current=i;
audio.src="music/"+String(i+1).padStart(2,'0')+".mp3";
audio.play();
}

function togglePlay(){
audio.paused?audio.play():audio.pause();
}

function nextTrack(){
if(document.getElementById("shuffle").checked){
current=Math.floor(Math.random()*songs.length);
}else{
current=(current+1)%songs.length;
}
playTrack(current);
}

function prevTrack(){
current=(current-1+songs.length)%songs.length;
playTrack(current);
}

audio.addEventListener("ended",()=>{

if(document.getElementById("loop").checked){
playTrack(current);
return;
}

if(document.getElementById("autoplay").checked){
nextTrack();
}

});

playTrack(0);

</script>

</body>
</html>
